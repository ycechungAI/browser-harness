<!DOCTYPE html>
<!-- browser-harness video template: renders a recording as a structured,
     privacy-safe explanatory video — chapter plan, semantic routes, readable
     narration, cursor-led camera, immediate click results, explanation/outcome
     cards — and exports webm via MediaRecorder. Everything is a pure function
     of the playhead: seek(t) is exact. See make-video.md for the workflow. -->
<html>
<head>
<meta charset="utf-8">
<title>browser-harness video</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0e14; overflow: hidden; }
  #stage { display: block; width: 100vw; height: 100vh; object-fit: contain; }
  #hud { position: fixed; left: 12px; bottom: 10px; color: #9aa; font: 12px/1.4 ui-monospace, monospace;
         background: rgba(0,0,0,.55); padding: 6px 10px; border-radius: 8px; user-select: none; }
</style>
</head>
<body>
<canvas id="stage" width="1920" height="1080"></canvas>
<div id="hud"></div>
<script src="composition.js"></script>
<script>
"use strict";
/* composition.js is compiler-owned. Author edit-brief.json; do not hand-edit
   renderer fields or copy this template as an alternative workflow. */
const C = window.COMPOSITION;
const VW = () => C.viewport?.w || 1392, VH = () => C.viewport?.h || 1170;

// ------------------------------ tuning ------------------------------
const W = 1920, H = 1080;
const PAD = 108;                   // generous breathing room around the window
const FRAME_STYLE = C.frameStyle || "native";
const TABSTRIP = FRAME_STYLE === "browser" ? 36 : 32;
const TOOLBAR = FRAME_STYLE === "browser" ? 44 : 0;
const CHROME = FRAME_STYLE === "raw" ? 0 : TABSTRIP + TOOLBAR;
const MOTION = C.motion || {};
const PACING = C.pacing || {};
const REDUCED_MOTION = matchMedia("(prefers-reduced-motion: reduce)").matches;
const PUNCH_S = REDUCED_MOTION ? 0 : (MOTION.zoomDuration ?? 0.46);
const DRIFT_MAX = REDUCED_MOTION ? 0 : (MOTION.panDuration ?? 0.58);
const CUR_S = REDUCED_MOTION ? 0 : (MOTION.cursorDuration ?? 0.52);
const AUTO_ZOOM = MOTION.autoZoom ?? 1.7;
const WIDE_SCALE = MOTION.wideScale ?? 0.8;
const CLICK_SAFE = {
  left: 140, right: 140, top: 150, bottom: 190,
  ...(MOTION.clickSafeInset || {}),
};
const REACTION_LAG = REDUCED_MOTION ? 0 : (MOTION.reactionLag ?? 0.025);
const REACTION_FADE = REDUCED_MOTION ? 0.001 : (MOTION.reactionFade ?? 0.04);
const RADIUS = 12;
const RAIL = H - 142;              // readable narration above the action/time rail
const STAGE = 0.94;                // camera output inset — backdrop margin at any zoom
const ACCENT = "#6ee7ff";
const MONO = "ui-monospace, 'SF Mono', Menlo, monospace";
const SANS = "system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
const SERIF = "'Tiempos Headline', 'Tiempos Text', 'Iowan Old Style', Georgia, serif";

const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeOutQuart = t => 1 - Math.pow(1 - t, 4);
const easeOutQuint = t => 1 - Math.pow(1 - t, 5);
const easeInOut = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const lerp = (a, b, t) => a + (b - a) * t;

// ------------------------------ timeline ------------------------------
function cardText(b) {
  const details = b.kind === "intro" ? (C.plan || [])
    : b.kind === "explanation" ? (b.points || []).flatMap(p => [p.label, p.text])
    : b.kind === "outcome" ? (b.outcomes || [])
    : [];
  return [b.title, b.sub, ...details].filter(Boolean).join(" ");
}
const wordCount = text => text ? String(text).trim().split(/\s+/).length : 0;
const cardReadSeconds = b => 0.4 + wordCount(cardText(b)) * 60 / (C.readingWpm || 380);
const cardBaseSeconds = b => b.kind === "intro" || b.kind === "outcome" ? 4.5
  : b.kind === "explanation" ? 4 : 3.5;
const cardTargetSeconds = b => Math.max(cardBaseSeconds(b), cardReadSeconds(b));
function defaultDur(b) {
  const text = b.card ? cardText(b) : (b.narration || b.caption);
  const words = text ? text.trim().split(/\s+/).length : 0;
  let base = b.card ? 3.5 : 0.7;
  if (b.kind === "intro" || b.kind === "outcome") base = 4.5;
  if (b.kind === "explanation") base = 4;
  if (b.click) base = 1.15;
  if (b.after) base = Math.max(base, 1.4);   // let the consequence land
  if (b.type) base = Math.max(base, 0.6 + b.type.text.length * 0.035);
  if (b.card) return cardTargetSeconds(b);
  const captionBase = PACING.captionBaseSeconds ?? 0.35;
  const secondsPerWord = PACING.captionSecondsPerWord ?? 0.2;
  return Math.max(base, words ? captionBase + secondsPerWord * words : base);
}
const beats = C.beats;
beats.forEach(b => { if (b.dur == null) b.dur = defaultDur(b); });
const starts = []; let T = 0;
for (const b of beats) { starts.push(T); T += b.dur; }
const DURATION = T;
const beatAt = t => { let i = beats.length - 1; while (i > 0 && t < starts[i]) i--; return i; };
const firstWindowBeat = beats.findIndex(b => !b.card);

beats.forEach(b => {
  if (b.label === undefined) {
    if (b.click && b.cursor) b.label = `click(${Math.round(b.cursor.x)}, ${Math.round(b.cursor.y)})`;
    else if (b.type) b.label = `type("${b.type.text}")`;
  }
});
const stepOf = []; let stepCount = 0;
beats.forEach((b, i) => { if (b.label) stepCount++; stepOf[i] = stepCount; });

// ------------------------------ preflight ------------------------------
const usedFrames = [...new Set(beats.flatMap(b => [b.frame, b.after]).filter(Boolean))];
const reviewedFrames = new Set(C.privacy?.reviewedFrames || []);
const preflightErrors = [];
const preflightWarnings = [];
const unsafeRoute = /@|[?#]|:\/\/|onmicrosoft|(?:tenant|user|object)[_-]?id|[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i;
const opaqueHex = /^#[0-9a-f]{6}$/i;
if (C.schemaVersion !== 1)
  preflightErrors.push("composition must use schema version 1");
if (C.frameStyle !== "native" || C.readingWpm !== 380)
  preflightErrors.push("composition changed generated typography or frame style");
if (!Number.isFinite(C.durationBudget) || DURATION > C.durationBudget + 0.001)
  preflightErrors.push(
    `video is ${DURATION.toFixed(1)}s; shorten it to the ${Number(C.durationBudget).toFixed(1)}s budget`,
  );
if (!Array.isArray(C.plan) || C.plan.length < 2 || C.plan.length > 5)
  preflightErrors.push("plan must contain 2–5 steps");
if (!beats[0]?.card || beats[0]?.kind !== "intro" || beats[0]?.dur < 4)
  preflightErrors.push("first beat must be an intro card lasting at least 4 seconds");
if (!beats.at(-1)?.card || beats.at(-1)?.kind !== "outcome" || !beats.at(-1)?.outcomes?.length)
  preflightErrors.push("last beat must be an outcome card with achieved outcomes");
for (const frame of usedFrames)
  if (!reviewedFrames.has(frame)) preflightErrors.push(`privacy review missing: ${frame}`);
for (const [i, b] of beats.entries()) {
  if (b.card && b.dur + 0.001 < cardTargetSeconds(b))
    preflightErrors.push(`beat ${i + 1} card is shorter than its structured scan target`);
  if (b.kind === "explanation") {
    const labels = (b.points || []).map(point => String(point.label || "").toLowerCase());
    if (labels.join("|") !== "observed|mistake|correction")
      preflightErrors.push(`beat ${i + 1} explanation must be Observed, Mistake, Correction`);
  }
}
if (FRAME_STYLE === "browser" && C.authenticity?.allowSyntheticChrome !== true)
  preflightErrors.push("synthetic browser chrome requires authenticity.allowSyntheticChrome=true");
for (const frame of usedFrames) {
  for (const [i, rect] of (C.redact?.[frame] || []).entries()) {
    const mask = C.privacy?.mask || {};
    const fill = rect.fill ?? mask.fill ?? "#f2f4f7";
    const stroke = rect.stroke ?? mask.stroke ?? "#e2e7ec";
    if (!opaqueHex.test(fill))
      preflightErrors.push(`${frame} mask ${i + 1} fill must be opaque six-digit hex`);
    if (stroke && !opaqueHex.test(stroke))
      preflightErrors.push(`${frame} mask ${i + 1} stroke must be opaque six-digit hex`);
  }
}
for (let i = 0; i < beats.length; i++) {
  const b = beats[i];
  const text = b.narration || b.caption;
  const wc = text ? String(text).trim().split(/\s+/).length : 0;
  if (wc > 7) preflightErrors.push(`beat ${i + 1} narration exceeds 7 words`);
  if (!b.card && (!Number.isInteger(b.chapter) || b.chapter < 0 || b.chapter >= (C.plan || []).length))
    preflightErrors.push(`beat ${i + 1} has no valid chapter`);
  if (!b.card && !b.route) preflightErrors.push(`beat ${i + 1} has no semantic route`);
  if (b.url) preflightErrors.push(`beat ${i + 1} uses a raw url; use route`);
  if (unsafeRoute.test(String(b.route || "")) || unsafeRoute.test(String(b.afterRoute || "")))
    preflightErrors.push(`beat ${i + 1} route contains sensitive/raw URL material`);
}
window.videoPreflight = () => ({
  errors: [...preflightErrors], warnings: [...preflightWarnings], frames: [...usedFrames],
});

// ------------------------------ assets ------------------------------
const images = new Map();
let ready = false;
const srcs = new Set();
beats.forEach(b => { if (b.frame) srcs.add(b.frame); if (b.after) srcs.add(b.after); });
Promise.all([...srcs].map(src => new Promise(res => {
  const im = new Image();
  im.onload = () => { images.set(src, im); res(); };
  im.onerror = () => res();
  im.src = src;
}))).then(() => { ready = true; draw(); });
window.videoReady = () => ready;

  if (!LOGO) return;

function frameRect() {
  const availW = W - PAD * 2, availH = H - PAD * 2;
  const s = Math.min(availW / VW(), (availH - CHROME) / VH());
  const w = VW() * s, h = VH() * s + CHROME;
  return { x: (W - w) / 2, y: (H - h) / 2 - 14, w, h, s };  // lifted: bottom rail breathes
}

  const total = widths.reduce((sum, width) => sum + width, 0) + gap * (widths.length - 1);
  let x = (W - total) / 2;
  for (let n = 0; n < C.plan.length; n++) {
    const active = n === chapter;
    roundRect(x, 26, widths[n], h, 18);
    ctx.fillStyle = active ? "rgba(10,12,18,0.93)" : "rgba(10,12,18,0.58)"; ctx.fill();
    ctx.strokeStyle = active ? "rgba(110,231,255,0.7)" : "rgba(255,255,255,0.12)";
    ctx.lineWidth = active ? 2 : 1; ctx.stroke();
    ctx.fillStyle = active ? "#fff" : "rgba(255,255,255,0.68)";
    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.fillText(`${n + 1}. ${C.plan[n]}`, x + 24, 56);
    x += widths[n] + gap;
  }
  if (detour) {
    ctx.font = `700 15px ${MONO}`;
    const label = "DETOUR";
    const w = ctx.measureText(label).width + 30;
    roundRect(W / 2 - w / 2, 92, w, 32, 16);
    ctx.fillStyle = "rgba(128,63,22,0.94)"; ctx.fill();
    ctx.fillStyle = "#fff"; ctx.textAlign = "center";
    ctx.fillText(label, W / 2, 108);
  }
}
function drawTelemetry(t, i, lt) {
  const b = beats[i];
  if (b.card) return;
  drawPlan(i);
  const cy = H - 74;
  if (b.label || b.error) {
    const parts = [];
    if (b.label) {
      parts.push([`${String(stepOf[i]).padStart(2, "0")}/${String(stepCount).padStart(2, "0")}`, true]);
      parts.push([b.label, false]);
    }
    if (b.error) parts.push(["⚠ ERROR", false]);
    chip(28, cy, parts, "left", b.error);
  }
  const bt = sticky(i, "t");
  if (bt != null) {
    let next = null;
    for (let k = i + 1; k < beats.length; k++) if (beats[k].t != null) { next = beats[k].t; break; }
    const cur = beats[i].t != null ? beats[i].t : bt;
    const shown = next != null ? lerp(cur, next, clamp(lt / b.dur, 0, 1)) : cur;
    const m = Math.floor(shown / 60), s = Math.floor(shown % 60);
    const parts = [[`${m}:${String(s).padStart(2, "0")}`, false]];
    parts.logo = true;
    chip(W - 28, cy, parts, "right");
  }
  ctx.save();
  const px0 = 28, pw = W - 56, py = H - 12;
  ctx.fillStyle = LIGHT_BG ? "rgba(31,30,27,0.12)" : "rgba(255,255,255,0.1)";
  ctx.fillRect(px0, py, pw, 2);
  ctx.fillStyle = LIGHT_BG ? "rgba(31,30,27,0.5)" : "rgba(255,255,255,0.55)";
  ctx.fillRect(px0, py, pw * (t / DURATION), 2);
  ctx.restore();
}

function narrationState(i) {
  for (let k = i; k >= 0; k--) {
    if (beats[k].card) return null;
    if (Object.prototype.hasOwnProperty.call(beats[k], "narration")) {
      if (!beats[k].narration) return null;
      return {
        text: String(beats[k].narration),
        index: k,
        error: beats[k].narrationError ?? beats[k].error ?? false,
      };
    }
  }
  return null;
}

function captionState(i) {
  const b = beats[i];
  if (b.card) return null;
  if (b.caption) return { text: b.caption, index: i, error: !!b.error };
  return narrationState(i);
}

function drawCaptionPill(state, alpha, rise = 0) {
  if (!state || alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  let fs = 56;
  ctx.font = `600 ${fs}px ${SANS}`;
  while (ctx.measureText(state.text).width > W * 0.64 && fs > 44) {
    fs -= 2; ctx.font = `600 ${fs}px ${SANS}`;
  }
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const ph = fs * 1.9;
  const y = RAIL + rise;
  const w = ctx.measureText(state.text).width;
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.4)"; ctx.shadowBlur = 24; ctx.shadowOffsetY = 6;
  roundRect(W / 2 - w / 2 - 26, y - ph / 2, w + 52, ph, ph / 2);
  ctx.fillStyle = state.error ? "rgba(52,10,14,0.9)" : "rgba(10,12,18,0.82)"; ctx.fill();
  ctx.restore();
  ctx.strokeStyle = state.error ? "rgba(255,90,90,0.55)" : "rgba(255,255,255,0.14)"; ctx.lineWidth = 1;
  roundRect(W / 2 - w / 2 - 26, y - ph / 2, w + 52, ph, ph / 2); ctx.stroke();
  ctx.fillStyle = state.error ? "#ffd7d7" : "#fff";
  ctx.fillText(state.text, W / 2, y + 1);
  ctx.restore();
}

function drawCaption(t, i) {
  const state = captionState(i);
  if (!state) return;
  const elapsed = t - starts[state.index];
  const k = REDUCED_MOTION ? 1 : easeOutQuart(clamp((elapsed - 0.04) / 0.22, 0, 1));
  if (state.index === i && i > 0 && k < 1) {
    const previous = captionState(i - 1);
    if (previous && previous.text !== state.text)
      drawCaptionPill(previous, 1 - k, -8 * k);
  }
  drawCaptionPill(state, k, 12 * (1 - k));
}

function drawCard(i, lt) {
  const b = beats[i];
  const last = i === beats.length - 1;
  const aIn = easeOutCubic(clamp(lt / 0.35, 0, 1));
  const aOut = last ? 1 : 1 - easeInOut(clamp((lt - (b.dur - 0.3)) / 0.3, 0, 1));
  const a = Math.min(aIn, aOut);
  ctx.save();
  ctx.globalAlpha = a;
  // Center each card's complete visual stack, not just its title. The intro is
  // shorter than explanation/outcome cards, so it needs the larger offset.
  const centerShift = b.kind === "intro" ? 154
    : b.kind === "explanation" ? 106
    : b.kind === "outcome" ? 116
    : 0;
  const rise = centerShift + (1 - aIn) * 16;
  drawLogo(W / 2 - 40, 130 + rise, 80, INK, 1);
  ctx.fillStyle = INK; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  let titleSize = 72;
  ctx.font = `600 ${titleSize}px ${SANS}`;
  while (ctx.measureText(b.title || "").width > W * 0.8 && titleSize > 52) {
    titleSize -= 2; ctx.font = `600 ${titleSize}px ${SANS}`;
  }
  ctx.fillText(b.title || "", W / 2, 300 + rise);
  if (b.sub) {
    ctx.font = `500 25px ${MONO}`;
    ctx.globalAlpha = a * 0.6; ctx.fillStyle = INK;
    ctx.fillText(b.sub, W / 2, 386 + rise);
    ctx.globalAlpha = a;
  }
  if (b.kind === "intro" && C.plan) {
    const gap = 18, w = 430, h = 118;
    const total = C.plan.length * w + (C.plan.length - 1) * gap;
    let x = (W - total) / 2;
    for (let n = 0; n < C.plan.length; n++) {
      roundRect(x, 525 + rise, w, h, 20);
      ctx.fillStyle = LIGHT_BG ? "rgba(255,255,255,0.62)" : "rgba(255,255,255,0.08)"; ctx.fill();
      ctx.strokeStyle = LIGHT_BG ? "rgba(31,30,27,0.18)" : "rgba(255,255,255,0.14)"; ctx.stroke();
      ctx.font = `700 20px ${MONO}`; ctx.textAlign = "left"; ctx.fillStyle = INK;
      ctx.fillText(String(n + 1).padStart(2, "0"), x + 28, 559 + rise);
      ctx.font = `600 26px ${SANS}`; ctx.fillText(C.plan[n], x + 28, 607 + rise);
      x += w + gap;
    }
  }
  if (b.kind === "explanation" && b.points) {
    const firstReveal = 1.1;
    const finalHold = 3.0;
    const revealSpan = Math.max(0, b.dur - firstReveal - finalHold);
    const revealGap = b.points.length > 1 ? revealSpan / (b.points.length - 1) : 0;
    const current = Math.min(
      b.points.length - 1,
      Math.max(-1, Math.floor((lt - firstReveal) / Math.max(0.001, revealGap))),
    );
    let y = 505 + rise;
    for (let n = 0; n < b.points.length; n++) {
      const point = b.points[n];
      const revealAt = firstReveal + n * revealGap;
      const k = lt < revealAt ? 0 : REDUCED_MOTION ? 1 : easeOutQuart(clamp((lt - revealAt) / 0.28, 0, 1));
      if (k <= 0) { y += 106; continue; }
      const active = n === current;
      const rowAlpha = active ? 1 : 0.56;
      const slide = REDUCED_MOTION ? 0 : 14 * (1 - k);
      ctx.textAlign = "left";
      ctx.font = `700 18px ${MONO}`; ctx.globalAlpha = a * k * rowAlpha; ctx.fillStyle = INK;
      const label = `${String(n + 1).padStart(2, "0")}  ${String(point.label || "").toUpperCase()}`;
      ctx.fillText(label, 360 + slide, y);
      ctx.font = `${active ? 650 : 560} 31px ${SANS}`;
      ctx.fillText(point.text || "", 590 + slide, y);
      y += 106;
    }
    ctx.globalAlpha = a;
  }
  if (b.kind === "outcome" && b.outcomes) {
    let y = 515 + rise;
    for (const outcome of b.outcomes) {
      ctx.beginPath(); ctx.arc(520, y, 18, 0, 7); ctx.fillStyle = "#157f63"; ctx.fill();
      ctx.fillStyle = "#fff"; ctx.font = `700 19px ${SANS}`; ctx.textAlign = "center"; ctx.fillText("✓", 520, y + 1);
      ctx.textAlign = "left"; ctx.fillStyle = INK; ctx.font = `600 32px ${SANS}`;
      ctx.fillText(outcome, 570, y);
      y += 92;
    }
  }
  ctx.restore();
}

function draw() {
  if (!ready) return;
  const t = clamp(playhead, 0, DURATION - 0.001);
  const i = beatAt(t), lt = t - starts[i];
  drawBackdrop();
  if (beats[i].card) { drawCard(i, lt); drawHud(t, i); return; }
  const cam = camera(t);
  ctx.save();
  // Stage inset: the camera's output maps to a slightly smaller rect so a
  // margin of backdrop stays visible on every side at ANY zoom (Screen Studio
  // keeps this breathing room; full-bleed content reads as a raw screencap).
  ctx.translate(W / 2, H / 2); ctx.scale(STAGE, STAGE); ctx.translate(-W / 2, -H / 2);
  ctx.translate(W / 2 + (cam.shake || 0), H / 2); ctx.scale(cam.s, cam.s); ctx.translate(-cam.x, -cam.y);
  // Screen-Studio window entrance after a card
  if (i === firstWindowBeat) {
    const k = easeOutCubic(clamp(lt / 0.45, 0, 1));
    const ws = 0.94 + 0.06 * k;
    ctx.translate(W / 2, H / 2); ctx.scale(ws, ws); ctx.translate(-W / 2, -H / 2);
    ctx.globalAlpha = 0.25 + 0.75 * k;
  }
  drawChromeWindow(i, lt);
  drawContent(t, i, lt);
  drawCursor(t, i, lt, cam);
  ctx.restore();
  ctx.globalAlpha = 1;
  if (beats[i].errorMotion) {
    const a = 0.12 * easeOutCubic(clamp(lt / 0.3, 0, 1));
    const g = ctx.createRadialGradient(W/2, H/2, H * 0.42, W/2, H/2, H * 0.85);
    g.addColorStop(0, "rgba(255,60,60,0)"); g.addColorStop(1, `rgba(255,50,50,${a})`);
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }
  drawTelemetry(t, i, lt);
  drawCaption(t, i, lt);
  drawHud(t, i);
}
function drawHud(t, i) {
  hud.textContent = `${t.toFixed(2)}s / ${DURATION.toFixed(2)}s  beat ${i + 1}/${beats.length}` +
    (recorder ? "  ● EXPORTING" : playing ? "  ▶" : "  ⏸");
}

// ------------------------------ playback ------------------------------
const hud = document.getElementById("hud");
let playhead = 0, playing = false, rafT0 = 0, recorder = null;

function tick(ts) {
  if (playing) {
    playhead = (ts - rafT0) / 1000;
    if (playhead >= DURATION) {
      playhead = DURATION; playing = false;
      if (recorder) recorder.stop();
    }
  }
  draw();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

window.seek = t => { playing = false; playhead = clamp(t, 0, DURATION); draw(); };
window.play = (from = playhead >= DURATION ? 0 : playhead) => {
  playhead = from; rafT0 = performance.now() - from * 1000; playing = true;
};
window.pause = () => { playing = false; };
window.duration = () => DURATION;

// Realtime export: plays once from 0 while MediaRecorder captures the canvas.
// Keep this tab focused — rAF throttles in background tabs and stalls capture.
window.exportVideo = (filename = "video.webm") => new Promise((resolve, reject) => {
  if (preflightErrors.length) {
    const message = `Export blocked: ${preflightErrors.join("; ")}`;
    window.__exportError = message;
    reject(new Error(message));
    return;
  }
  const stream = canvas.captureStream(60);
  const mime = ["video/webm;codecs=vp9", "video/webm;codecs=vp8", "video/webm"]
    .find(m => MediaRecorder.isTypeSupported(m));
  recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 14_000_000 });
  const chunks = [];
  recorder.ondataavailable = e => e.data.size && chunks.push(e.data);
  recorder.onstop = () => {
    recorder = null;
    const blob = new Blob(chunks, { type: "video/webm" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = filename; a.click();
    window.__exported = filename;
    resolve(filename);
  };
  recorder.start();
  window.play(0);
});

document.addEventListener("keydown", e => {
  if (e.key === " ") { e.preventDefault(); playing ? pause() : play(); }
  if (e.key === "ArrowRight") seek(playhead + (e.shiftKey ? 1 : 0.1));
  if (e.key === "ArrowLeft") seek(playhead - (e.shiftKey ? 1 : 0.1));
  if (e.key === "e") exportVideo();
});
</script>
</body>
